# Preview-only config for the Hexo 8 upgrade branch.
# This is served from https://robotjuhwan.github.io/poul-preview/
# and must not be indexed or treated as the production site.

preview: true
url: https://robotjuhwan.github.io/poul-preview
root: /poul-preview/
public_dir: public_preview

deploy:
  type: git
  repo: git@github-robot:robotjuhwan/poul-preview.git
  branch: gh-pages

adsense: false

robotstxt:
  useragent: "*"
  allow: []
  disallow:
    - /
  sitemap: false

head:
  canonical_url: false
  manifest:
    start_url: /poul-preview/
    icons:
      -
        src: /poul-preview/img/icon-192.png
        sizes: 192x192
        type: image/png
      -
        src: /poul-preview/img/icon-512.png
        sizes: 512x512
        type: image/png
  open_graph:
    image: /poul-preview/img/poul_logo.jpg
  meta:
    - 'name=theme-color;content=#3273dc'
    - 'name=robots;content=noindex,nofollow,noarchive'

sitemap:
  path: sitemap.xml
  tag: false
  category: false

plugins:
  cookie_consent:
    policyLink: /poul-preview/privacy/
